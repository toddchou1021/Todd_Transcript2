hotkey:
  transcribe: ctrl+alt+f
  translate: ctrl+alt+d
ui_language: en
target_language: zh
postprocess: true
pipeline_api:
  url: ws://127.0.0.1:8765/ws/pipeline
  timeout: 300
recorder:
  sample_rate: 16000
  channels: 1
  input_mode: system_audio
realtime:
  show_partial_words: false
  gemini_translate_model: gemini-3.5-live-translate-preview
hotwords_file: data/hotwords.txt
history_file: data/history.json
gemini:
  api_key: ""
  model: gemini-3.1-flash-lite
